<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MobileShop Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">

    <main class="flex min-h-screen">

        <!-- Overlay -->
        <div id="overlay" class="fixed inset-0 bg-black opacity-70 z-40 hidden lg:hidden">
        </div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed top-0 left-0 z-50 w-64 h-screen bg-[#081028] text-white flex flex-col
    transform -translate-x-full transition duration-300 lg:translate-x-0 lg:static">

            <!-- Close Button -->
            <button id="close-btn" class="absolute top-6 right-4 lg:hidden text-white">

                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />

                </svg>

            </button>

            <!-- Logo -->
            <div class="border-b border-gray-700 px-6 py-4">
                <h1 class="text-2xl font-bold">
                    📱 MobileShop
                </h1>
            </div>

            <!-- Menu -->
            <div class="flex flex-col justify-between flex-1 px-6 py-4">
                <div class="">

                    <h2 class="text-xs text-gray-400 font-semibold tracking-widest mb-5">
                        MANAGEMENT
                    </h2>

                    <!-- MENU -->
                    <ul class="space-y-2">
                        <li>
                            <a href="#"
                                class="block rounded-lg bg-gradient-to-r from-pink-500 to-purple-500 px-4 py-3 font-medium">
                                Dashboard
                            </a>
                        </li>

                        <li>
                            <a href="#" class="block rounded-lg px-4 py-3 hover:bg-gray-800 transition">
                                Products
                            </a>
                        </li>

                        <li>
                            <a href="#" class="block rounded-lg px-4 py-3 hover:bg-gray-800 transition">
                                Orders
                            </a>
                        </li>

                        <li>
                            <a href="#" class="block rounded-lg px-4 py-3 hover:bg-gray-800 transition">
                                Users
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="p-4 border-t border-gray-700">
                    <!-- BOTTOM BUTTON -->
                    <button class="w-full rounded-lg bg-gray-800 py-3 hover:bg-gray-700 transition">
                        Logout
                    </button>
                </div>

            </div>
            <!-- <div class="absolute bottom-0 left-0 w-full p-4 border-t border-gray-700">

                <button class="w-full rounded-lg bg-gray-800 py-3 hover:bg-gray-700 transition">
                    Logout
                </button>

            </div> -->

        </aside>

        <!-- Right Content -->
        <section class="flex-1 overflow-hidden">

            <!-- Top Navbar -->
            <header class="flex items-center justify-between bg-white px-5 py-4 shadow-sm">

                <!-- Left -->
                <div class="flex items-center gap-4">

                    <!-- Hamburger -->
                    <button id="menu-btn" class="lg:hidden rounded-lg border border-gray-300 p-2">

                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />

                        </svg>

                    </button>

                    <h1 class="text-2xl font-bold text-gray-800">
                        Dashboard
                    </h1>

                </div>

            </header>

            <!-- Main Content -->
            <div class="p-3 sm:p-5">

                <!-- Cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

                    <!-- Card -->
                    <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">

                        <div class="bg-green-100 p-3 rounded-xl">

                            <img src="image/dolla.png" alt="" class="w-8">

                        </div>

                        <div>
                            <p class="text-gray-500 text-lg">
                                Total Sales
                            </p>

                            <h2 class="text-2xl font-bold">
                                $0.00
                            </h2>
                        </div>

                    </div>

                    <!-- Card -->
                    <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">

                        <div class="bg-blue-100 p-3 rounded-xl">

                            <img src="image/curt.png" alt="" class="w-8">

                        </div>

                        <div>
                            <p class="text-gray-500 text-lg">
                                Total Orders
                            </p>

                            <h2 class="text-2xl font-bold">
                                0
                            </h2>
                        </div>

                    </div>

                    <!-- Card -->
                    <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">

                        <div class="bg-purple-100 p-3 rounded-xl">

                            <img src="image/human.png" alt="" class="w-8">

                        </div>

                        <div>
                            <p class="text-gray-500 text-lg">
                                Customers
                            </p>

                            <h2 class="text-2xl font-bold">
                                1
                            </h2>
                        </div>

                    </div>

                    <!-- Card -->
                    <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">

                        <div class="bg-red-100 p-3 rounded-xl">

                            <img src="image/danger.png" alt="" class="w-8">

                        </div>

                        <div>
                            <p class="text-gray-500 text-lg">
                                Low Stock Items
                            </p>

                            <h2 class="text-2xl font-bold">
                                0
                            </h2>
                        </div>

                    </div>

                </div>

                <!-- Table -->
                <div class="mt-8 bg-white rounded-2xl shadow-sm overflow-hidden">

                    <!-- Table Header -->
                    <div class="flex items-center justify-between px-6 py-5 border-b">

                        <h2 class="text-2xl font-semibold">
                            Recent Orders
                        </h2>

                        <a href="#" class="text-pink-800 text-sm font-medium">
                            View all →
                        </a>

                    </div>

                    <!-- Responsive Table -->
                    <div class="w-full overflow-x-auto">

                        <table class="w-full text-2xl">

                            <thead class="bg-gray-50">

                                <tr class="text-left text-gray-500 text-xl">

                                    <th class="px-4 py-3 whitespace-nowrap">
                                        ORDER ID
                                    </th>

                                    <th class="px-4 py-3 whitespace-nowrap">
                                        CUSTOMER
                                    </th>

                                    <th class="px-4 py-3 whitespace-nowrap">
                                        DATE
                                    </th>

                                    <th class="px-4 py-3 whitespace-nowrap">
                                        TOTAL
                                    </th>

                                    <th class="px-4 py-3 whitespace-nowrap">
                                        STATUS
                                    </th>

                                </tr>

                            </thead>



                        </table>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <!-- JavaScript -->
    <script>

        const menuBtn = document.getElementById("menu-btn");
        const sidebar = document.getElementById("sidebar");
        const closeBtn = document.getElementById("close-btn");
        const overlay = document.getElementById("overlay");

        // Open Sidebar
        menuBtn.addEventListener("click", () => {

            sidebar.classList.remove("-translate-x-full");

            // SHOW overlay
            overlay.classList.remove("hidden");

        });

        // Close Sidebar
        closeBtn.addEventListener("click", () => {

            sidebar.classList.add("-translate-x-full");

            // HIDE overlay
            overlay.classList.add("hidden");

        });

        // Click Overlay
        overlay.addEventListener("click", () => {

            sidebar.classList.add("-translate-x-full");

            // HIDE overlay
            overlay.classList.add("hidden");

        });

    </script>
</body>

</html>
